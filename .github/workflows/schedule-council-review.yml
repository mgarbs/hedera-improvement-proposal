name: Immediate Status Update

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  check-merged-file:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Get modified file
        id: get-modified-file
        run: |
          # Get the modified file from the merged pull request
          MODIFIED_FILE=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }} | grep -E '^HIP/.*\.md$')
          echo "Modified file: $MODIFIED_FILE"
          echo "MODIFIED_FILE=$MODIFIED_FILE" >> $GITHUB_ENV

      - name: Check if modified file is in Last Call
        if: env.MODIFIED_FILE != ''
        id: check-last-call
        run: |
          # Check if the modified file has a status of 'Last Call'
          if grep -qE '^status: Last Call' "$MODIFIED_FILE"; then
            echo "File is in Last Call"
            echo "LAST_CALL=true" >> $GITHUB_ENV
          else
            echo "File is not in Last Call"
            echo "LAST_CALL=false" >> $GITHUB_ENV
          fi

      - name: Determine new status
        if: env.LAST_CALL == 'true'
        id: determine-status
        run: |
          # Get the 'type' and 'category' values from the HIP file
          hip_type=$(grep -oP '(?<=^type: )\w+' "$MODIFIED_FILE")
          hip_category=$(grep -oP '(?<=^category: )\w+' "$MODIFIED_FILE")

          # Determine the new status based on 'type' and 'category'
          if [[ "$hip_type" == "Standards Track" ]]; then
            if [[ "$hip_category" == "Application" ]]; then
              new_status="Accepted"
            else
              new_status="Council Review"
            fi
          elif [[ "$hip_type" == "Informational" || "$hip_type" == "Process" ]]; then
            new_status="Active"
          fi

          echo "STATUS_UPDATE_FILE=$MODIFIED_FILE" >> $GITHUB_ENV
          echo "STATUS_UPDATE_STATUS=$new_status" >> $GITHUB_ENV

  update-status:
    needs: check-merged-file
    if: env.STATUS_UPDATE_FILE != '' && env.STATUS_UPDATE_STATUS != ''
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Update HIP status
        run: |
          sed -i "s/^status: Last Call/status: ${{ env.STATUS_UPDATE_STATUS }}/" "${{ env.STATUS_UPDATE_FILE }}"

      - name: Create PR for status update
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add "${{ env.STATUS_UPDATE_FILE }}"
          git commit -m "Update status of ${{ env.STATUS_UPDATE_FILE }} to ${{ env.STATUS_UPDATE_STATUS }}"
          git push origin HEAD:status-update-${{ github.sha }}
          gh pr create --title "Update status of ${{ env.STATUS_UPDATE_FILE }} to ${{ env.STATUS_UPDATE_STATUS }}" --body "Automatically updating the status of ${{ env.STATUS_UPDATE_FILE }} to ${{ env.STATUS_UPDATE_STATUS }}." --base master --head status-update-${{ github.sha }}
