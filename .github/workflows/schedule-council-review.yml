name: Schedule Status Update

on:
  push:
    branches:
      - master

jobs:
  start-timer:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Identify HIPs in Last Call
        id: find-last-call
        run: |
          # Fetch the master branch
          git fetch origin master

          # Get HIP files that have status set to 'Last Call'
          LAST_CALL_HIPS=$(grep -rlE '^status: Last Call' HIP/ | xargs grep -lE '^type: Standards Track' | xargs grep -lE '^category: (Core|Service|Mirror|Application)')

          # Check if there's any HIP that has a 'last-call-date-time' in the future
          if [ -n "$LAST_CALL_HIPS" ]; then
            echo "LAST_CALL_HIPS=$LAST_CALL_HIPS" >> $GITHUB_ENV
          else
            echo "LAST_CALL_HIPS=" >> $GITHUB_ENV
          fi

  set-delayed-action:
    needs: start-timer
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Update HIP Status
        if: env.LAST_CALL_HIPS != ''
        run: |
          for file in $LAST_CALL_HIPS; do
            # Extract the 'last-call-date-time' value from the HIP file
            last_call_date=$(grep -oP '(?<=^last-call-date-time: )[0-9]{4}-[0-9]{2}-[0-9]{2}' "$file")

            # Calculate the target date (2 weeks from the 'last-call-date-time')
            target_date=$(date -d "$last_call_date + 14 days" +%Y-%m-%d)

            # Get the current date
            current_date=$(date +%Y-%m-%d)

            # Check if the current date is on or after the target date
            if [[ "$current_date" >= "$target_date" ]]; then
              # Get the 'type' value from the HIP file
              hip_type=$(grep -oP '(?<=^type: )\w+' "$file")

              # Get the 'category' value from the HIP file
              hip_category=$(grep -oP '(?<=^category: )\w+' "$file")

              # Update the status based on the 'type' and 'category'
              if [[ "$hip_type" == "Standards Track" ]]; then
                if [[ "$hip_category" == "Application" ]]; then
                  sed -i "s/^status: Last Call/status: Accepted/" "$file"
                else
                  sed -i "s/^status: Last Call/status: Council Review/" "$file"
                fi
              elif [[ "$hip_type" == "Informational" || "$hip_type" == "Process" ]]; then
                sed -i "s/^status: Last Call/status: Active/" "$file"
              fi
            fi
          done

      - name: Create PR for Status Update
        if: env.LAST_CALL_HIPS != ''
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add HIP/
          git commit -m "Update HIP status based on last-call-date-time"
          git push origin HEAD:status-update-pr