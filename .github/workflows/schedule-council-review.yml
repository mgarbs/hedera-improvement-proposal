name: Schedule Status Update

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  check-merged-file:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Get modified files
        id: get-modified-files
        run: |
          # Fetch the latest changes from the base branch
          git fetch origin ${{ github.base_ref }}

          # Get the modified files from the merged pull request
          MODIFIED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...${{ github.sha }})
          echo "Modified files: $MODIFIED_FILES"
          echo "modified_files<<EOF" >> $GITHUB_OUTPUT
          echo "$MODIFIED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if modified files are in HIP directory and have .md extension
        if: steps.get-modified-files.outputs.modified_files != ''
        id: check-hip-files
        run: |
          # Filter the modified files to only include those in the HIP directory with .md extension
          HIP_FILES=""
          while IFS= read -r file; do
            if [[ $file == HIP/*.md ]]; then
              HIP_FILES="$HIP_FILES $file"
            fi
          done <<< "${{ steps.get-modified-files.outputs.modified_files }}"
          
          # Print the modified HIP files
          if [ -z "$HIP_FILES" ]; then
            echo "No modified HIP files found."
          else
            echo "Modified HIP files: $HIP_FILES"
            echo "hip_files=$HIP_FILES" >> $GITHUB_OUTPUT
          fi

      - name: Check if modified files are in Last Call
        if: steps.check-hip-files.outputs.hip_files != ''
        id: check-last-call
        run: |
          # Check if any of the modified files have a status of 'Last Call'
          last_call_files=""
          for file in ${{ steps.check-hip-files.outputs.hip_files }}; do
            if grep -qE '^status: Last Call' "$file"; then
              last_call_files="$last_call_files $file"
            fi
          done
          if [[ -n "$last_call_files" ]]; then
            echo "Files in Last Call: $last_call_files"
            echo "last_call_files=$last_call_files" >> $GITHUB_OUTPUT
          else
            echo "No files in Last Call"
          fi

      - name: Schedule status update
        if: steps.check-last-call.outputs.last_call_files != ''
        env:
          CRON_EXPRESSION: ${{ github.event.pull_request.merged_at }}
        run: |
          # Process each file in Last Call
          for file in ${{ steps.check-last-call.outputs.last_call_files }}; do
            # Extract the 'last-call-date-time' value from the HIP file
            last_call_date_time=$(grep -oP '(?<=^last-call-date-time: )[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z' "$file")

            # Get the 'type' value from the HIP file
            hip_type=$(grep -oP '(?<=^type: )\w+' "$file")

            # Get the 'category' value from the HIP file
            hip_category=$(grep -oP '(?<=^category: )\w+' "$file")

            # Determine the new status based on the 'type' and 'category'
            if [[ "$hip_type" == "Standards Track" ]]; then
              if [[ "$hip_category" == "Core" || "$hip_category" == "Service" || "$hip_category" == "Mirror" ]]; then
                new_status="Council Review"
              elif [[ "$hip_category" == "Application" ]]; then
                new_status="Accepted"
              fi
            elif [[ "$hip_type" == "Informational" || "$hip_type" == "Process" ]]; then
              new_status="Active"
            fi

            # Schedule the status update job
            echo "Scheduling status update for $file to $new_status at $last_call_date_time"
            echo "::set-output name=status_update_file::$file"
            echo "::set-output name=status_update_status::$new_status"
            echo "$last_call_date_time" > .github/workflows/schedule.txt

  update-status:
    needs: check-merged-file
    if: needs.check-merged-file.outputs.status_update_file != '' && needs.check-merged-file.outputs.status_update_status != ''
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Read schedule file
        id: read-schedule
        run: echo "::set-output name=schedule::$(cat .github/workflows/schedule.txt)"

      - name: Wait until scheduled time
        env:
          SCHEDULE: ${{ steps.read-schedule.outputs.schedule }}
        run: |
          echo "Waiting until $SCHEDULE"
          while [[ "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" < "$SCHEDULE" ]]; do
            sleep 60
          done

      - name: Update HIP status
        run: |
          sed -i "s/^status: Last Call/status: ${{ needs.check-merged-file.outputs.status_update_status }}/" "${{ needs.check-merged-file.outputs.status_update_file }}"

      - name: Create PR for status update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add "${{ needs.check-merged-file.outputs.status_update_file }}"
          git commit -m "Update status of ${{ needs.check-merged-file.outputs.status_update_file }} to ${{ needs.check-merged-file.outputs.status_update_status }}"
          git push origin HEAD:status-update-${{ github.sha }}
          gh pr create --title "Update status of ${{ needs.check-merged-file.outputs.status_update_file }} to ${{ needs.check-merged-file.outputs.status_update_status }}" --body "Automatically updating the status of ${{ needs.check-merged-file.outputs.status_update_file }} to ${{ needs.check-merged-file.outputs.status_update_status }} based on the last-call-date-time." --base master --head status-update-${{ github.sha }}